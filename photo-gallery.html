<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Quantum Labs Photo Restoration Gallery - Before and after photo restoration and enhancement examples.">
<title>Photo Restoration Gallery | Quantum Labs</title>
<link rel="stylesheet" href="styles.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:Arial,Helvetica,sans-serif;
    background:#050814;
    color:#fff;
    margin:0;
    background-image:
        radial-gradient(circle at 20% 20%,rgba(0,180,255,.18),transparent 25%),
        radial-gradient(circle at 80% 10%,rgba(0,120,255,.12),transparent 25%);
}
header{
    text-align:center;
    background:linear-gradient(135deg,#0066ff,#00c6ff);
    padding: 30px 20px;
}
header .logo-container {
    max-width: 900px;
    width: 95%;
    margin: 0 auto 15px auto;
    display: block;
    text-decoration: none;
}
header .logo-container img {
    width: 100%;
    height: auto;
    object-fit: contain;
    border: none !important;
}
.back-btn {
    display: inline-block;
    margin-top: 10px;
    color: #fff;
    text-decoration: none;
    font-weight: bold;
    background: rgba(0,25,60,.4);
    padding: 8px 18px;
    border-radius: 20px;
    border: 1px solid rgba(120,220,255,.5);
    transition: .3s;
}
.back-btn:hover {
    background: rgba(0,180,255,.3);
}

.gallery-container {
    max-width: 960px;
    margin: 40px auto;
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 35px;
}

.gallery-card {
    background: #111b2e;
    border: 2px solid rgba(120,220,255,.30);
    border-radius: 18px;
    padding: 25px;
    text-align: center;
    box-shadow: 0 0 18px rgba(0,180,255,.10);
}

.gallery-card h3 {
    color: #5fd8ff;
    font-size: 1.6rem;
    margin-bottom: 20px;
}

.split-preview {
    display: flex;
    gap: 15px;
    width: 100%;
    justify-content: center;
}

.split-preview div {
    width: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.split-preview img {
    width: 100%;
    height: 320px;
    object-fit: contain;
    background: #0b1528;
    border-radius: 12px;
    border: 1px solid rgba(120,220,255,.2);
}

.split-preview span {
    margin-top: 8px;
    color: #cdefff;
    font-size: 0.95rem;
    font-weight: bold;
}

footer{
    background:#000;
    padding:25px 0 15px;
    margin-top:50px;
    text-align:center;
    color:#888;
    font-size:14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
}

@media (max-width: 768px) {
    .split-preview {
        flex-direction: column;
        gap: 15px;
    }
    .split-preview div {
        width: 100%;
    }
}
</style>
</head>
<body>

<header>
    <a href="index.html" class="logo-container">
        <img src="ql-logo.jpg" alt="Quantum Labs">
    </a>
    <a href="index.html" class="back-btn">&larr; Back to Home</a>
</header>

<div class="gallery-container">
    <!-- Restoration Project 1: Dave Relighting -->
    <div class="gallery-card">
        <h3>Photo Relighting &amp; Enhancement</h3>
        <div class="split-preview">
            <div>
                <img src="dave-backlight.jpg" alt="Before Relighting">
                <span>Before</span>
            </div>
            <div>
                <img src="dave-blue-sky.jpg" alt="After Relighting">
                <span>After</span>
            </div>
        </div>
    </div>

    <!-- Restoration Project 2: Pauline Portrait -> Severe Damage Restoration -->
    <div class="gallery-card">
        <h3>Severe Damage Restoration</h3>
        <div class="split-preview">
            <div>
                <img src="pauline-original.jpg" alt="Original Damaged Photo">
                <span>Before (Original)</span>
            </div>
            <div>
                <img src="pauline-restored.jpg" alt="Restored Portrait">
                <span>After (Restored)</span>
            </div>
        </div>
    </div>

    <!-- Restoration Project 3: Meth Girl -> Portrait Restoration -->
    <div class="gallery-card">
        <h3>Portrait Restoration</h3>
        <div class="split-preview">
            <div>
                <img src="meth-girl.jpg" alt="Meth Girl Original">
                <span>Before</span>
            </div>
            <div>
                <img src="meth-girl-fixed.jpg" alt="Meth Girl Fixed">
                <span>After</span>
            </div>
        </div>
    </div>
</div>

<footer>
    <img src="ql-logo.jpg" alt="Quantum Labs Seal" style="max-width:130px; width:100%; border-radius:10px;">
    <div>© 2026 QUANTUM LABS</div>
</footer>

</body>
</html>
