<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketing Graphics & Creative Design | Quantum Labs</title>
<link rel="stylesheet" href="styles.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:Arial,Helvetica,sans-serif;
    background:#050814;
    color:#fff;
    margin:0;
    background-image:
        radial-gradient(circle at 20% 20%,rgba(0,180,255,.18),transparent 25%),
        radial-gradient(circle at 80% 10%,rgba(0,120,255,.12),transparent 25%);
}
header{
    text-align:center;
    background:linear-gradient(135deg,#0066ff,#00c6ff);
    padding: 30px 20px;
}
header h1{
    font-size: 2.2rem;
    margin-bottom: 10px;
}
header a{
    color: #e0f4ff;
    text-decoration: none;
    font-size: 0.95rem;
}
header a:hover{
    text-decoration: underline;
}

.gallery-container {
    max-width: 900px;
    margin: 40px auto;
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 40px;
}

.gallery-card {
    background: #0d1527;
    border: 1px solid rgba(120,220,255,.25);
    border-radius: 16px;
    padding: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,.4);
    text-align: center;
}

.gallery-card h2 {
    font-size: 1.5rem;
    color: #fff;
    margin-bottom: 20px;
    text-align: left;
}

.gallery-card img {
    max-width: 100%;
    height: auto;
    border-radius: 10px;
    display: block;
    margin: 0 auto;
}

footer{
    background:#000;
    padding:25px 0 15px;
    margin-top:50px;
    text-align:center;
    color:#888;
    font-size:14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
}
</style>
</head>
<body>

<header>
    <h1>Marketing Graphics &amp; Creative Design</h1>
    <a href="index.html">&larr; Return to Home</a>
</header>

<div class="gallery-container">

    <!-- CAMPAIGN 1: ELEVATE GYMNASTICS -->
    <div class="gallery-card">
        <h2>Elevate Gymnastics Campaign</h2>
        <img src="elevate-gymnastics-campaigne.jpg" alt="Elevate Gymnastics Campaign">
    </div>

    <!-- CAMPAIGN 2: THE WEDDING MALL OF NY -->
    <div class="gallery-card">
        <h2>The Wedding Mall of NY Logo</h2>
        <img src="TWM-logo.jpg" alt="The Wedding Mall of NY Logo">
    </div>

    <!-- CAMPAIGN 3: RESUME MASTERY -->
    <div class="gallery-card">
        <h2>Resume Mastery Campaign</h2>
        <img src="resume-mastery.jpg" alt="Resume Mastery Campaign">
    </div>

</div>

<footer>
    <img src="dark-ql-logo.jpg" alt="Quantum Labs Seal" style="max-width:130px; width:100%; border-radius:10px;">
    <div>© 2026 QUANTUM LABS</div>
</footer>

</body>
</html>
