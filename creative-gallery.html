<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Quantum Labs Creative Design & Marketing Graphics Gallery - Elevate Gymnastics, Wedding Mall of NY, and Resume Mastery campaigns.">
<title>Creative Artwork & Marketing Graphics | Quantum Labs</title>
<link rel="stylesheet" href="styles.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:Arial,Helvetica,sans-serif;
    background:#050814;
    color:#fff;
    margin:0;
    background-image:
        radial-gradient(circle at 20% 20%,rgba(0,180,255,.18),transparent 25%),
        radial-gradient(circle at 80% 10%,rgba(0,120,255,.12),transparent 25%);
}
header{
    text-align:center;
    background:linear-gradient(135deg,#0066ff,#00c6ff);
    padding: 30px 20px;
}
header .logo-container {
    max-width: 900px;
    width: 95%;
    margin: 0 auto 15px auto;
    display: block;
    text-decoration: none;
}
header .logo-container img {
    width: 100%;
    height: auto;
    object-fit: contain;
    border: none !important;
}
.back-btn {
    display: inline-block;
    margin-top: 10px;
    color: #fff;
    text-decoration: none;
    font-weight: bold;
    background: rgba(0,25,60,.4);
    padding: 8px 18px;
    border-radius: 20px;
    border: 1px solid rgba(120,220,255,.5);
    transition: .3s;
}
.back-btn:hover {
    background: rgba(0,180,255,.3);
}

.gallery-container {
    max-width: 900px;
    margin: 40px auto;
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 35px;
}

.gallery-card {
    background: #111b2e;
    border: 2px solid rgba(120,220,255,.30);
    border-radius: 18px;
    padding: 25px;
    text-align: center;
    box-shadow: 0 0 18px rgba(0,180,255,.10);
}

.gallery-card h3 {
    color: #5fd8ff;
    font-size: 1.6rem;
    margin-bottom: 20px;
}

.gallery-card img {
    max-width: 100%;
    height: auto;
    border-radius: 12px;
    display: block;
    margin: 0 auto;
}

footer{
    background:#000;
    padding:25px 0 15px;
    margin-top:50px;
    text-align:center;
    color:#888;
    font-size:14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
}
</style>
</head>
<body>

<header>
    <a href="index.html" class="logo-container">
        <img src="ql-logo.png" alt="Quantum Labs">
    </a>
    <a href="index.html" class="back-btn">&larr; Back to Home</a>
</header>

<div class="gallery-container">

    <!-- Campaign 1: Elevate Gymnastics -->
    <div class="gallery-card">
        <h3>Elevate Gymnastics Campaign</h3>
        <img src="elevate-gymnastics-campaigne.jpg" alt="Elevate Gymnastics Campaign">
    </div>

    <!-- Campaign 2: The Wedding Mall of NY Logo -->
    <div class="gallery-card">
        <h3>The Wedding Mall of NY Logo</h3>
        <img src="TWM-logo.jpg" alt="The Wedding Mall of NY Logo">
    </div>

    <!-- Campaign 3: Resume Mastery Campaign -->
    <div class="gallery-card">
        <h3>Resume Mastery Campaign</h3>
        <img src="resume-mastery.jpg" alt="Resume Mastery Campaign">
    </div>

</div>

<footer>
    <img src="ql-logo.jpg" alt="Quantum Labs Seal" style="max-width:130px; width:100%; border-radius:10px;">
    <div>© 2026 QUANTUM LABS</div>
</footer>

</body>
</html>
