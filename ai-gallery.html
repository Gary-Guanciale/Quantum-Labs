<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Visualization | Quantum Labs</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, Helvetica, sans-serif;
    background: #050814;
    color: #fff;
    margin: 0;
    background-image:
        radial-gradient(circle at 20% 20%, rgba(0, 180, 255, .18), transparent 25%),
        radial-gradient(circle at 80% 10%, rgba(0, 120, 255, .12), transparent 25%);
}

header {
    text-align: center;
    background: linear-gradient(135deg, #0066ff, #00c6ff);
    padding: 40px 20px;
}

header h1 {
    font-size: 3.5em;
    font-weight: 900;
    color: #fff;
    margin-bottom: 10px;
    text-shadow: 0 3px 8px rgba(0, 0, 0, .25);
}

.back-link {
    color: #cdefff;
    text-decoration: none;
    font-weight: bold;
    font-size: 1.1rem;
}

.back-link:hover {
    text-decoration: underline;
}

section {
    max-width: 900px;
    margin: auto;
    padding: 50px 25px;
}

.gallery-grid {
    display: flex;
    flex-direction: column;
    gap: 35px;
}

.gallery-item {
    background: #111b2e;
    border: 1px solid rgba(120, 220, 255, .2);
    border-radius: 12px;
    padding: 30px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, .3);
}

.gallery-item h3 {
    font-size: 1.8em;
    color: #5fd8ff;
    margin-bottom: 8px;
}

.gallery-item p {
    color: #cbd5e1;
    font-size: 1.1em;
    margin-bottom: 20px;
}

.split-preview {
    display: flex;
    width: 100%;
    height: 400px;
    overflow: hidden;
    background: #050814;
    border: 1px solid rgba(120, 220, 255, .2);
    border-radius: 8px;
}

.split-preview img {
    width: 50%;
    height: 100%;
    object-fit: cover;
}

footer {
    background: #000;
    padding: 25px 0;
    margin-top: 60px;
    text-align: center;
    color: #888;
    font-size: 14px;
}

@media (max-width: 768px) {
    header h1 { font-size: 2.2em; }
    .split-preview { height: 220px; }
}
</style>
</head>
<body>

<header>
    <h1>AI Visualization</h1>
    <a href="index.html" class="back-link">← Return to Quantum Labs</a>
</header>

<main>
    <section>
        <div class="gallery-grid">
            
            <!-- Renovation Concepts (Houses) -->
            <div class="gallery-item">
                <h3>Renovation Concepts</h3>
                <p>Visualize renovation concepts before construction begins.</p>
                <div class="split-preview">
                    <img src="old-house.jpg" alt="Before House Visualization">
                    <img src="old-house-renovated.jpg" alt="After House Visualization">
                </div>
            </div>
            
        </div>
    </section>
</main>

<footer>© 2026 QUANTUM LABS</footer>

</body>
</html>
